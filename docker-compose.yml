services:
  postgres:
    image: postgres:16
    container_name: expense-postgres
    environment:
      POSTGRES_DB: expense_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - expense-postgres-data:/var/lib/postgresql/data

  app:
    build: .
    container_name: expense-tracker-app
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/expense_tracker
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"

  pgadmin:
    image: dpage/pgadmin4
    container_name: expense-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@expense.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  expense-postgres-data: