<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add transaction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Two+Tone" rel="stylesheet">
    <style>
        body{
            background-color: #1b263b;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        label{
            margin-bottom: 5px;
        }
        input{
            width: 200px;
        }
        #trans-img{
            border-radius: 15px;
        }
        .container
        {
            box-shadow: 0 4px 15px rgb(255, 192, 0);
        }
        .grad-text{
            background: linear-gradient(45deg, #0d6efd, #ffffff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }
        .btn.btn-primary:hover{
            background-color: yellow;
            color: black;
            font-weight: 400;
        }
    </style>
</head>
<body>
<div class="container border border-2 border-white p-3 rounded">
    <div class="row g-0 align-items-center">
        <!--left side image-->
        <div class="col-md-6">
            <img th:src="@{/images/transaction-img.PNG}" id="trans-img" alt="No image for transaction" style="height: 500px;width: 500px">
        </div>
        <!--right side form-->
        <div class="col-md-6">
            <h2 class="text-center mb-5 grad-text">Add your transaction <i class="bi bi-credit-card-2-front-fill"></i></h2>
            <div th:if="${hasError}" class="alert alert-danger" th:text="${error}"></div>
            <form action="/transactions/add" method="POST">
                <div class="form-container">
                    <input id="id" type="hidden" name="id"
                           th:value="(${transaction} != null ? ${transaction.id} : '')"/>
                    <div class="mb-3">
                        <label for="category">Category</label>
                        <select class="form-control" id="category" name="category" required>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.name}"
                                    th:text="${cat.name}">
                            </option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="type">Transaction Type</label>
                        <select class="form-control" id="type" name="type" required>
                            <option th:each="t : ${types}"
                                    th:value="${t}"
                                    th:text="${t}">
                            </option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="amount">Amount</label>
                        <input type="number"
                               class="form-control"
                               id="amount"
                               name="amount"
                               step="0.01"
                               min="0.01"
                               required
                               placeholder="Enter amount">
                    </div>
                    <div class="mb-3">
                        <label for="description">Description</label>
                        <input type="text"
                               class="form-control"
                               id="description"
                               name="description"
                               placeholder="Enter description"
                               required>
                    </div>
                    <div class="mb-3">
                        <label for="date">Date</label>
                        <input type="date"
                               class="form-control"
                               id="date"
                               name="date"
                               required>
                    </div>
                    <div class="mt-3 text-center">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-wallet-fill"></i> Save transaction</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
