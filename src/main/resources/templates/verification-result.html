<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Email verification</title></head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Two+Tone" rel="stylesheet">
<style>
    body {
        background-color: #1b263b;
        color: white;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .card {
        background: #ffffff;
        color: #333;
        border-radius: 16px;
        max-width: 500px;
        width: 100%;
        box-shadow:
                0 0 8px 2px rgba(13, 110, 253, 0.7),
                0 0 15px 4px rgba(13, 110, 253, 0.5),
                0 0 20px 6px rgba(102, 16, 242, 0.3);
    }
    a.btn-login{
        text-decoration: none;
        color: darkblue;
    }
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    .fade-in-up{
        animation: fadeInUp 0.8s ease-out;
    }
</style>
<body>

<div class="card p-3 fade-in-up text-center">
    <h2 th:text="${message}"></h2>
    <i class="bi bi-check-circle-fill" style="font-size: 4rem; color: #198754;"></i>
    <a href="/login" class="btn-login">Go to Log in<i class="bi bi-box-arrow-in-right"></i></a>
</div>

</body>
</html>
