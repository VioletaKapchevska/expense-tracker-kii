<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Header</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Two+Tone" rel="stylesheet">
    <style>

        .navbar {
            background-color: #0d1b2a;
            margin-bottom: 5px;
        }
        .navbar-nav .nav-link,.navbar-brand {
            color: white !important;
        }
        .navbar-nav .nav-link:hover {
            color: #00bfff !important;
        }
        #logo {
            height: 50px;
            width: 50px;
            margin-right: 5px;
            border-radius: 50%;
            border: 2px solid #00bfff;
        }
        #appName {
            width: 0;
            overflow: hidden;
            white-space: nowrap;
            animation: typing 3s steps(26, end) infinite;
            text-shadow: 1px 1px 2px black, 0 0 15px #00bfff, 0 0 5px #1e90ff;
        }
        @keyframes typing {
            0% { width: 0; }
            50% { width: 26ch; }
            100% { width: 0; }
        }
        .fw-bold {
            color: white !important;
        }
        .fw-bold:hover {
            color: #00bfff !important;
        }
        .border-bottom{
            border-bottom: 1px white;
        }
    </style>
</head>
<body>
<nav  th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark border-bottom">
    <div class="container-fluid">
        <img th:src="@{/images/logo2.jpg}" id="logo" alt="Logo">
        <div class="d-flex align-items-center position-relative" style="width: 220px;">
            <a class="navbar-brand position-absolute" href="#" id="appName">SaveWaveApp</a>
        </div>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-3">
                <li class="nav-item">
                    <a class="nav-link active" href="/home">Home</a>
                </li>
                <li>
                    <a class="nav-link" href="/budget">Set your budget</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/transactions">Transactions</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/charts">Charts</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/profile">Profile</a>
                </li>
            </ul>

            <ul class="navbar-nav ms-auto">
                <!-- Only show when user is not authenticated -->
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link fw-bold" href="/signup"><i class="bi bi-person"></i> Sign Up</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link fw-bold" href="/login"><i class="bi bi-person"></i> Login</a>
                </li>

                <!-- Only show when user is authenticated -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link fw-bold" href="/logout-message">
                        <i class="bi bi-box-arrow-right"></i> Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
