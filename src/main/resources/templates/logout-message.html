<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logout-message</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Two+Tone" rel="stylesheet">
  <style>
    body{
      background-color: #1b263b;
    }
    .card{
      background-color: #d1e7dd;
    }
    a:hover{
      text-decoration: underline;
      color: #2ecc71;
    }
    @keyframes fadeIn {
      from { opacity: 0;
        transform: translateY(20px);
      }
      to { opacity: 1;
        transform: translateY(0);
      }
    }
    .card {
      animation: fadeIn 1s ease-out;
    }

  </style>
</head>
<body>
<!--the message-->

<div class="container d-flex flex-column justify-content-center align-items-center min-vh-100 text-center">
  <div class="card text-black p-3 border border-2 border-black rounded-4 shadow-lg">
    <div class="card-body p-2">
      <div>
        <i class="bi bi-check-circle-fill text-success fs-1 mb-3"></i>
      </div>
      You have been logged out <br>
      <a class="fw-bold" href="/home" style="text-decoration: none; color: black">Go back home</a>
    </div>
  </div>
</div>


</body>
</html>
