<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Two+Tone" rel="stylesheet">
    <style>
        body {
            color: black;
            background-color: #1b263b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .profile-card {
            background-color: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            border: 3px solid #198754;
            box-shadow: 0 0 10px rgba(25, 135, 84, 0.3),
            0 0 15px rgba(25, 135, 84, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            gap: 30px;
        }
        img {
            max-width: 100%;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); /* сива сенка */
        }
        .custom-hover:hover{
            background-color: darkred;
            color: white;
            border: 1px solid black;
        }
        hr{
            border: none;
            height: 2px;
            background-color: #198754;
        }
        footer{
            background-color: #0d1b2a;
            border-top: 1px solid white;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }
        .bi-instagram:hover,
        .bi-twitter:hover,
        .bi-facebook:hover{
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 191, 255, 0.4);
        }
        .navbar {
            background-color: #0d1b2a;
            margin-bottom: 10px;
        }
        .navbar-nav .nav-link,.navbar-brand {
            color: white !important;
        }
        .navbar-nav .nav-link:hover {
            color: #00bfff !important;
        }
        #logo {
            height: 50px;
            width: 50px;
            margin-right: 5px;
            border-radius: 50%;
            border: 2px solid #00bfff;
        }
        #appName {
            width: 0;
            overflow: hidden;
            white-space: nowrap;
            animation: typing 3s steps(26, end) infinite;
            text-shadow: 1px 1px 2px black, 0 0 15px #00bfff, 0 0 5px #1e90ff;
        }
        @keyframes typing {
            0% { width: 0; }
            50% { width: 26ch; }
            100% { width: 0; }
        }
        .fw-bold {
            color: white !important;
        }
        .fw-bold:hover {
            color: #00bfff !important;
        }
        .border-bottom{
            border-bottom: 1px white;
        }
    </style>
</head>
<body>

<!--header part-->
<header th:replace="header :: navbar"></header>

<main class="p-5 w-100">
    <div class="row justify-content-center w-100">
        <div class="col-md-8 profile-card d-flex align-items-center">
            <div class="col-5 text-center mr-2">
                <img th:src="@{/images/user-pfp.PNG}" alt="User profile picture">
            </div>
            <div class="col-7">
                <h2 class="mb-4 fw-700">Profile Info</h2>
                <hr class="w-75">
                <p><i class="bi bi-person-fill me-2"></i><strong>First Name:</strong> <span th:text="${user.name}"></span></p>
                <p><i class="bi bi-person-badge-fill me-2"></i><strong>Last Name:</strong> <span th:text="${user.getSurname()}"></span></p>
                <p><i class="bi bi-envelope-fill me-2"></i><strong>Email:</strong> <span th:text="${user.getEmail()}"></span></p>
                <a th:href="@{/profile/change/password}" class="btn btn-success mt-3 custom-hover"> <i class="bi bi-shield-lock-fill me-2"></i>Change Password</a>
            </div>
        </div>
    </div>
</main>

<!--footer part-->
<footer th:replace="footer :: footer"></footer>




</body>
</html>
