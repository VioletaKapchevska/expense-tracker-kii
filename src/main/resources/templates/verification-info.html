<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Verify Email</title></head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Two+Tone" rel="stylesheet">
<style>
    body {
        background-color: #1b263b;
        color: white;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .card {
        background: #ffffff;
        color: #333;
        border-radius: 16px;
        max-width: 500px;
        width: 100%;
        box-shadow:
                0 0 8px 2px rgba(13, 110, 253, 0.7),
                0 0 15px 4px rgba(13, 110, 253, 0.5),
                0 0 20px 6px rgba(102, 16, 242, 0.3);
    }
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    .fade-in-up{
        animation: fadeInUp 0.8s ease-out;
    }
</style>
<body>

<div class="card fade-in-up bg-white color-black p-3 text-center">
    <h2 class="mb-3">Almost done!</h2>
    <i class="bi bi-envelope-check-fill text-primary fs-1 mb-3"></i>
    <p>
        We’ve sent a verification email to <strong th:text="${email}">your email</strong>.<br>
        Please click the link in that email to activate your account.
    </p>
</div>
</body>
</html>
