<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Two+Tone" rel="stylesheet">
  <title>Login</title>
  <style>
    body {
      background-color: #1b263b;
      color: white;
    }
    .navbar {
      background-color: #0d1b2a;
    }
    .navbar-nav .nav-link,.navbar-brand {
      color: white !important;
    }
    .navbar-nav .nav-link:hover {
      color: #00bfff !important;
    }
    #logo {
      height: 50px;
      width: 50px;
      margin-right: 5px;
      border-radius: 50%;
      border: 2px solid #00bfff;
    }
    label, input{
      margin-bottom: 3px;
    }

    .toast.custom-animate {
      animation: scaleIn 0.5s ease-out forwards;
      opacity: 0;
      transform: scale(0.8);
    }

    @keyframes scaleIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    footer{
      background-color: #0d1b2a;
      border-top: 1px solid white;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
    }
  </style>
</head>
<body>

<!--popup-->
<div class="position-fixed top-50 start-50 translate-middle p-3" style="z-index: 1055;">
  <div th:if="${hasError}" class="toast custom-animate fs-5 p-4 align-items-center text-bg-danger border-0 show" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body text-center">
        <span th:text="${error}"></span>
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark border-bottom">
  <div class="container-fluid">
    <img th:src="@{/images/logo2.jpg}" id="logo" alt="Logo">
    <div class="d-flex align-items-center position-relative" style="width: 220px;">
      <a class="navbar-brand position-absolute" href="/home" id="appName">SaveWaveApp</a>
    </div>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-3">
        <li class="nav-item">
          <a class="nav-link active" href="/home">Home</a>
        </li>
      </ul>

    </div>
  </div>
</nav>

<h2 class="text-white text-center mb-3 mt-3">Sign Up</h2>

<div class="d-flex flex-column justify-content-center align-items-center">
  <form action="/signup" method="post" class="border border-2 border-white p-3 rounded-4" style="width: 450px">

    <div class="form-group">
      <label>First Name:</label>
      <input class="form-control" type="text" id="name" name="name" required />
    </div>

    <div class="form-group">
      <label>Last Name:</label>
      <input class="form-control" type="text" id="surname" name="surname" required />
    </div>

    <div class="form-group">
      <label for="username">Username:</label>
      <input class="form-control" type="text" id="username" name="username" required />
    </div>

    <div class="form-group">
      <label for="email">Email:</label><br />
      <input class="form-control" type="email" id="email" name="email" required /><br /><br />
    </div>

    <div class="form-group">
      <label for="password">Password:</label>
      <input class="form-control" type="password" id="password" name="password" required />
    </div>

    <div class="form-group">
      <label for="password">Repeat password:</label>
      <input class="form-control" type="password" id="repeatPassword" name="repeatPassword" required />
    </div>

    <div class="form-group">
      <label>Phone Number:</label>
      <input class="form-control" type="text" id="phoneNumber" name="phoneNumber" required />
    </div>
    <div></div>

    <div class="text-center mt-3">
      <button type="submit" class="btn btn-primary text-center">Register</button>
    </div>
  </form>
</div>

<div style="height: 120px;"></div>
<!--footer part-->
<div th:replace="footer :: footer"></div>



</body>
</html>
