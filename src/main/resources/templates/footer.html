<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Footer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Two+Tone" rel="stylesheet">
    <style>
        footer{
            background-color: #0d1b2a;
            border-top: 1px solid white;
        }
        .bi-instagram:hover,
        .bi-twitter:hover,
        .bi-facebook:hover{
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 191, 255, 0.4);
        }
    </style>
</head>
<body>

<footer th:fragment="footer" class="container-fluid text-center mt-5 p-3">
    <p class="text-white m-0 text-uppercase">©SaveWave App 2025</p>

    <div class="d-flex justify-content-center gap-4 mt-3">
        <a href="#" class="text-white fs-4" title="Twitter">
            <i class="bi bi-twitter"></i>
        </a>
        <a href="#" class="text-white fs-4" title="Facebook">
            <i class="bi bi-facebook"></i>
        </a>
        <a href="#" class="text-white fs-4" title="Instagram">
            <i class="bi bi-instagram"></i>
        </a>
    </div>
</footer>

</body>
</html>
