<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Two+Tone" rel="stylesheet">
  <style>
    body{
      background: linear-gradient(135deg, #1b263b, #2e8b57, #1e3a8a);
      color: white;
    }
    label,input{
      margin-bottom: 3px;
    }
    form{
      border-radius: 15px;
      max-width: 400px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.7);
    }
  </style>
</head>
<body>

<!--popup-->
<div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">
  <div class="toast align-items-center text-white border-0"
       th:classappend="${hasError} ? 'bg-danger':'bg-success'"
       th:if="${message}" role="alert" aria-live="assertive" aria-atomic="true" id="msgToast">
    <div class="d-flex">
      <div class="toast-body" th:text="${message}"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<div class="d-flex justify-content-center align-items-center min-vh-100">
  <form th:action="@{/profile/change/password}" th:method="post" class="p-4 bg-success border border-1 border-black">
    <h2 class="text-center">Change your password</h2>
    <div class="mb-3">
      <label for="oldPassword" class="form-label">Current password:</label>
      <div class="input-group">
        <span class="input-group-text bg-white"><i class="bi bi-lock-fill"></i></span>
        <input type="password" class="form-control" id="oldPassword" name="oldPassword" placeholder="Current password" required>
      </div>
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1" class="form-label">Enter new password:</label>
      <div class="input-group">
        <span class="input-group-text bg-white"><i class="bi bi-lock-fill"></i></span>
        <input type="password" class="form-control" name="newPassword" id="exampleInputPassword1" placeholder="Password">
      </div>
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword2" class="form-label">Repeat your new password:</label>
      <div class="input-group">
        <span class="input-group-text bg-white"><i class="bi bi-lock-fill"></i></span>
        <input type="password" class="form-control" name="repeatPassword" id="exampleInputPassword2" placeholder="Password">
      </div>
    </div>
    <button type="submit" class="btn btn-dark mt-3 custom-btn w-100">Submit</button>
  </form>
</div>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    const toastEl = document.getElementById('msgToast');
    if (toastEl) {
      const toast = new bootstrap.Toast(toastEl, { delay: 4000 });
      toast.show();
    }
  });
</script>
</body>
</html>
