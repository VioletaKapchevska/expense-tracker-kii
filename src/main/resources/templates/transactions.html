<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transactions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Two+Tone" rel="stylesheet">
    <style>
        body {
            color: white;
            background-color: #1b263b;
            text-align: center;
        }
        .btn.btn-primary:hover{
            background-color: yellow;
            color: black;
        }
        .container {
            padding-bottom: 100px; /* or enough to clear the footer height */
        }
        h1{
            background: linear-gradient(45deg, #0d6efd, #ffffff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
            display: inline-block;
            text-align: center;
        }
        h2{
            background: linear-gradient(45deg, #0d6efd, #ffffff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
            display: inline-block;
        }
        .card{
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        .card:hover{
            box-shadow: 0 5px 5px rgba(255, 215, 0, 0.7);
            filter: brightness(1.1);
        }
        footer{
            background-color: #0d1b2a;
            border-top: 1px solid white;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }
        .bi-instagram:hover,
        .bi-twitter:hover,
        .bi-facebook:hover{
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 191, 255, 0.4);
        }
        .navbar {
            background-color: #0d1b2a;
            margin-bottom: 10px;
        }
        .navbar-nav .nav-link,.navbar-brand {
            color: white !important;
        }
        .navbar-nav .nav-link:hover {
            color: #00bfff !important;
        }
        #logo {
            height: 50px;
            width: 50px;
            margin-right: 5px;
            border-radius: 50%;
            border: 2px solid #00bfff;
        }
        #appName {
            width: 0;
            overflow: hidden;
            white-space: nowrap;
            animation: typing 3s steps(26, end) infinite;
            text-shadow: 1px 1px 2px black, 0 0 15px #00bfff, 0 0 5px #1e90ff;
        }
        @keyframes typing {
            0% { width: 0; }
            50% { width: 26ch; }
            100% { width: 0; }
        }
        .fw-bold {
            color: white !important;
        }
        .fw-bold:hover {
            color: #00bfff !important;
        }
        .border-bottom{
            border-bottom: 1px white;
        }

    </style>
</head>
<body>
<div th:replace="header :: navbar"></div>
<h1 class="mb-4 p-3">SaveWave App</h1>

<div class="container mt-3">
    <form th:action="@{/transactions}" th:method="GET">
        <div class="row g-3">
            <div class="col-md-4 form-group fw-bold">
                <label for="searchCategory" class="form-label">Search by category</label>
                <select class="form-select" id="searchCategory" name="categoryName">
                    <option value="">All Categories</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.getName()}"
                             th:text="${category.getName()}"
                    th:selected="${category.getName()== categoryName}">
                    </option>
                </select>

            </div>
            <div class="col-md-4 form-group">
                <label for="searchType" class="form-label fw-bold">Search by type</label>
                <select class="form-select" id="searchType" name="type">
                    <option value="">All Types</option>
                    <option th:each="t : ${types}"
                            th:value="${t}"
                            th:text="${t}"
                            th:selected="${t == type}">
                    </option>
                </select>
            </div>
            <div class="col-md-4 form-group">
                <label for="categorySelect" class="form-label fw-bold">Select transaction</label>
                <select name="transactionId" id="categorySelect" class="form-select">
                    <option value="">Transactions:</option>
                    <option th:each="t : ${transactions}"
                            th:value="${t?.id}"
                            th:text="${t.category.name + ' - ' + t.type + ' - ' + t.amount}"
                            th:selected="${t.id != null && transactionId == t.id}">
                    </option>
                </select>
            </div>
            <!--search btn-->
            <div class="text-center">
                <button class="btn btn-primary" type="submit" style="width: 100px">Search</button>
            </div>
        </div>
    </form>
</div>

<hr>
<h2 class="text-center">Transactions <i class="bi bi-cash-stack"></i></h2>
<!--second part-->

<div class="container mb-4 mt-4">
    <div class="row">
        <div class="col-12" th:if="${page.totalElements > 0}">
            <div class="row g-3">
                <div class="col-md-4" th:each="transaction : ${page.getContent()}">
                    <div class="card h-100 border-2 border-warning">
                        <div class="card-body">
                            <h5 class="card-title text-center" th:text="${transaction.category.name}">Category Name</h5>
                            <p class="card-text mb-1">
                                <strong>Type:</strong>
                                <span th:text="${transaction.type}">Transaction Type</span>
                            </p>
                            <p class="card-text">
                                <strong>Amount:</strong>
                                <span th:text="${transaction.amount}">Amount</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-4" th:include="fragments/paging :: pageSection(${page})"></div>
        </div>

        <div class="mt-4">
            <a href="/transactions/add-form" class="btn btn-primary ext-black p-3">
                Add new transaction
            </a>
        </div>

    </div>

</div>
<div th:replace="footer :: footer"></div>



</body>
</html>
