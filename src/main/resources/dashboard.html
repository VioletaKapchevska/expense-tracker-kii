<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body>
<h1>Budget Tracker</h1>

<div>
    <h2>Add Transaction</h2>
    <form th:action="@{/transactions/add}" th:object="${transaction}" method="post">
        <input type="text" th:field="*{title}" placeholder="Title"/>
        <input type="number" th:field="*{amount}" placeholder="Amount"/>
        <select th:field="*{category}">
            <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}">Category</option>
        </select>
        <select th:field="*{type}">
            <option value="INCOME">Income</option>
            <option value="EXPENSE">Expense</option>
        </select>
        <input type="date" th:field="*{date}"/>
        <button type="submit">Add Transaction</button>
    </form>
</div>

<div>
    <h2>Add Budget</h2>
    <form th:action="@{/budgets/add}" th:object="${budget}" method="post">
        <select th:field="*{category}">
            <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}">Category</option>
        </select>
        <input type="number" th:field="*{amount}" placeholder="Amount"/>
        <input type="month" th:field="*{month}"/>
        <button type="submit">Add Budget</button>
    </form>
</div>

<!-- Google Charts here -->
<div id="piechart" style="width: 600px; height: 400px;"></div>

<script th:inline="javascript">
    /* JS for loading chart data from controller */
    // Placeholder: Replace with real chart code later
</script>

</body>
</html>
